<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Cycle Tracker</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="cycletracker.json" />
    <link rel="icon" href="icons/circle.svg" />
  </head>
  <body>
    <h1>Period tracker</h1>
    <section id="auth">
      <h2>Sign in</h2>
      <form id="auth-form">
        <p>
          <label for="auth-email">Email</label>
          <input type="email" id="auth-email" autocomplete="email" required />
        </p>
        <p>
          <label for="auth-password">Password</label>
          <input
            type="password"
            id="auth-password"
            autocomplete="current-password"
            minlength="6"
            required
          />
        </p>
        <p>
          <button type="submit">Sign in / Sign up</button>
        </p>
      </form>
      <p>
        <button id="sign-out" type="button" hidden>Sign out</button>
      </p>
      <p id="auth-status"></p>
    </section>
    <form id="new-period">
      <fieldset>
        <legend>Enter your period start and end date</legend>
        <p>
          <label for="start-date">Start date</label>
          <input type="date" id="start-date" required />
        </p>
        <p>
          <label for="end-date">End date</label>
          <input type="date" id="end-date" required />
        </p>
      </fieldset>
      <p>
        <button type="submit">Add Period</button>
      </p>
    </form>
    <section id="past-periods"></section>

      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js" defer></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
</html>
